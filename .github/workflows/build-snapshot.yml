name: Build Daytona Snapshot

on:
  push:
    paths:
      - "snapshots/**"
    branches:
      - main
  workflow_dispatch:
    inputs:
      snapshot_name:
        description: "Optional snapshot name to build (default: all)"
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - name: copperline-base
            image: ghcr.io/copperline-ai/sandbox:copperline-base

    steps:
      - uses: actions/checkout@v4

      - name: Determine selected snapshot
        id: select
        shell: bash
        run: |
          selected="${{ github.event.inputs.snapshot_name || '' }}"
          if [[ -n "$selected" && "$selected" != "${{ matrix.name }}" ]]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping ${{ matrix.name }} because dispatch requested '$selected'."
            exit 0
          fi
          echo "run=true" >> "$GITHUB_OUTPUT"

      - name: Log in to ghcr.io
        if: steps.select.outputs.run == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        id: build
        if: steps.select.outputs.run == 'true'
        uses: docker/build-push-action@v6
        with:
          context: snapshots/${{ matrix.name }}
          file: snapshots/${{ matrix.name }}/Dockerfile
          push: true
          # Push the friendly rolling tag AND an immutable per-commit tag. The
          # per-commit tag is what the snapshot pins to (see register step).
          tags: |
            ${{ matrix.image }}
            ${{ matrix.image }}-${{ github.sha }}
          build-args: |
            SOURCE_COMMIT=${{ github.sha }}
          # Push a plain single-manifest image (no attestation index) so Daytona
          # pulls a normal image, not an attestation manifest list.
          provenance: false

      - name: Install Daytona CLI
        if: steps.select.outputs.run == 'true'
        run: |
          curl -fsSL "https://github.com/daytonaio/daytona/releases/download/v0.183.0/daytona-linux-amd64" \
            -o /usr/local/bin/daytona && chmod +x /usr/local/bin/daytona

      - name: Pre-flight Daytona health check
        if: steps.select.outputs.run == 'true'
        env:
          DAYTONA_API_URL: ${{ secrets.DAYTONA_API_URL }}
          DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
        shell: bash
        run: |
          if [[ -z "$DAYTONA_API_URL" || -z "$DAYTONA_API_KEY" ]]; then
            echo "::error::DAYTONA_API_URL and DAYTONA_API_KEY secrets must be set in repo settings"
            exit 1
          fi
          daytona snapshot list >/dev/null

      - name: Register snapshot with Daytona
        if: steps.select.outputs.run == 'true'
        env:
          DAYTONA_API_URL: ${{ secrets.DAYTONA_API_URL }}
          DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
          SNAPSHOT_NAME: ${{ matrix.image }}
          IMAGE_REF: ${{ matrix.image }}-${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail

          # Keep the snapshot NAME stable (consumers create sandboxes from it),
          # but pin its source IMAGE to the per-commit tag we just pushed — never
          # the rolling :copperline-base tag. Resolving the rolling tag is what let
          # Daytona's builder reuse a stale locally-cached layer under the fresh
          # digest's name, shipping sandboxes without opencode on PATH. A tag the
          # builder has never seen forces a fresh pull; the SOURCE_COMMIT label
          # makes its digest unique, so every push yields a brand-new derived
          # image. (Daytona rejects @sha256 digest refs — "invalid reference
          # format" — so a per-commit tag is used instead of the digest.)
          echo "Snapshot name : ${SNAPSHOT_NAME}"
          echo "Pinned image  : ${IMAGE_REF}"
          image_ref="${IMAGE_REF}"

          # Snapshots are immutable once created; delete first so each push
          # re-registers the stable name against the new digest.
          daytona snapshot delete "$SNAPSHOT_NAME" >/dev/null 2>&1 || true

          max_attempts=6
          attempt=1
          delay=2

          while (( attempt <= max_attempts )); do
            echo "Registering snapshot '$SNAPSHOT_NAME' -> '$image_ref' (attempt ${attempt}/${max_attempts})"
            output="$(daytona snapshot create "$SNAPSHOT_NAME" --image "$image_ref" 2>&1)" && {
              echo "$output"
              exit 0
            }

            echo "$output"

            if grep -qi "already exists" <<< "$output"; then
              echo "Snapshot still present, deleting and retrying..."
              daytona snapshot delete "$SNAPSHOT_NAME" || true
            fi

            if (( attempt == max_attempts )); then
              echo "::error::Failed to register snapshot '$SNAPSHOT_NAME' after ${max_attempts} attempts."
              exit 1
            fi

            echo "Retrying in ${delay}s..."
            sleep "$delay"
            delay=$((delay * 2))
            attempt=$((attempt + 1))
          done

      - name: Error recovery details
        if: failure() && steps.select.outputs.run == 'true'
        run: |
          echo "Snapshot registration failed for ${{ matrix.name }} (${{ matrix.image }})"
          echo "Re-run this workflow from Actions after verifying Daytona service health and credentials."
