issuer: $DEX_ISSUER_URL

storage:
  type: postgres
  config:
    host: $DEX_DB_HOST
    port: $DEX_DB_PORT
    database: $DEX_DB_DATABASE
    user: $DEX_DB_USERNAME
    password: $DEX_DB_PASSWORD
    ssl:
      mode: require

web:
  http: 0.0.0.0:5556
  allowedOrigins: ['*']
  allowedHeaders: ['x-requested-with']

staticClients:
  - id: daytona
    redirectURIs:
      - '$DAYTONA_API_URL'
      - '$DAYTONA_API_URL/api/oauth2-redirect.html'
      - '$DAYTONA_PROXY_URL/callback'
    name: 'Daytona'
    public: true

enablePasswordDB: true
staticPasswords:
  - email: '$DEX_ADMIN_EMAIL'
    hash: '$DEX_ADMIN_PASSWORD_HASH'
    username: 'admin'
    userID: '08a8684b-db88-4b73-90a9-3cd1661f5466'
