# Named Cloudflare tunnel config. Copy to config.yml and fill in your values.
#
#   1. cloudflared tunnel login
#   2. cloudflared tunnel create daytona-local         # prints a <TUNNEL_ID> + creds json
#   3. cp ~/.cloudflared/<TUNNEL_ID>.json ./cloudflared/
#   4. cloudflared tunnel route dns daytona-local runner.example.com
#      cloudflared tunnel route dns daytona-local registry.example.com
#   5. fill this file in and `docker compose up -d`
#
# The two hostnames below are what you put in .env as PUBLIC_RUNNER_URL
# (https://runner.example.com) and PUBLIC_REGISTRY_HOST (registry.example.com).

tunnel: <TUNNEL_ID>
credentials-file: /etc/cloudflared/<TUNNEL_ID>.json

ingress:
  - hostname: runner.example.com
    service: http://runner:3003
  - hostname: registry.example.com
    service: http://registry:5000
  # default: everything else 404s
  - service: http_status:404
