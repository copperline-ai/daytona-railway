# fly.toml app configuration file generated for copperline-daytona-runner on 2026-05-30T12:41:38Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'copperline-daytona-runner'
primary_region = 'ord'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 3003
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[files]]
  guest_path = '/root/.docker/config.json'
  secret_name = 'GHCR_DOCKER_CONFIG_JSON'

[[files]]
  guest_path = '/home/daytona/.docker/config.json'
  secret_name = 'GHCR_DOCKER_CONFIG_JSON'

[[mounts]]
  source = "docker_data"
  destination = "/var/lib/docker"
  initial_size = "25gb"

[[vm]]
  cpu_kind = 'performance'
  cpus = 2
  memory_mb = 4096
  privileged = true
