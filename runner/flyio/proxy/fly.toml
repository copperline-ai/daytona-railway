app = 'copperline-daytona-proxy'
primary_region = 'ord'

[build]
  dockerfile = 'Dockerfile'

# Daytona toolbox proxy. Inbound: HTTPS (Fly terminates TLS at 443 -> 4000).
# Outbound: -> Railway daytona API (public) for auth/lookup, and -> the runner
# over Fly's private 6PN network at copperline-daytona-runner.internal:3003.
[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
