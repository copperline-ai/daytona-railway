version: 0.1
log:
  level: info
  fields:
    service: registry
storage:
  s3:
    region: us-east-1
    regionendpoint: https://minio-production-3b7b.up.railway.app
    bucket: daytona
    rootdirectory: /registry
    secure: true
    forcepathstyle: true
    # accesskey/secretkey are injected via Fly secrets
    # (REGISTRY_STORAGE_S3_ACCESSKEY / REGISTRY_STORAGE_S3_SECRETKEY)
  delete:
    enabled: true
  maintenance:
    uploadpurging:
      enabled: false
http:
  addr: 0.0.0.0:5000
  headers:
    X-Content-Type-Options: [nosniff]
auth:
  htpasswd:
    realm: Daytona Registry
    path: /auth/htpasswd
health:
  storagedriver:
    enabled: true
    interval: 10s
    threshold: 3
